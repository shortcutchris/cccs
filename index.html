<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Cheatsheet — The Ultimate Reference</title>
  <meta name="description" content="Interactive cheatsheet for Claude Code — keyboard shortcuts, slash commands, workflows, CLI flags, MCP servers, and more.">
  <meta name="theme-color" content="#0d1117">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          }
        }
      }
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
    }
    .light {
      --bg: #ffffff;
      --card: #f6f8fa;
      --border: #d0d7de;
      --text: #1f2328;
      --muted: #656d76;
    }
    body { background: var(--bg); color: var(--text); }
    .accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, padding 0.3s ease-out; }
    .accordion-body.open { max-height: 200px; }
    .nav-pill::-webkit-scrollbar { display: none; }
    .nav-pill { -ms-overflow-style: none; scrollbar-width: none; }
    .chevron { transition: transform 0.2s ease; }
    .chevron.rotate { transform: rotate(180deg); }
    .copy-btn:active { transform: scale(0.9); }
    @media print {
      body { background: white !important; color: black !important; }
      .no-print { display: none !important; }
      .print-break { page-break-inside: avoid; }
      .accordion-body { max-height: none !important; overflow: visible !important; padding-bottom: 8px !important; }
      header, .hero-section, .newsletter-section { display: none !important; }
      main { padding-top: 0 !important; }
      section { break-inside: avoid; }
      .print-grid { display: grid !important; grid-template-columns: 1fr 1fr; gap: 12px; }
      .print-grid > section { font-size: 10px; }
      footer { display: none !important; }
      * { color: black !important; background: white !important; border-color: #ccc !important; }
      .print-grid .font-mono { color: #333 !important; }
    }
    .badge-new { background: #22c55e20; color: #22c55e; }
    .badge-changed { background: #f59e0b20; color: #f59e0b; }
    .badge-deprecated { background: #ef444420; color: #ef4444; text-decoration: line-through; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #8b949e; border-top-color: #a855f7; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="font-sans min-h-screen" x-data="cheatsheet()" x-init="init()" :class="theme === 'light' ? 'light' : ''">

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 backdrop-blur no-print" :style="'background:' + (theme === 'light' ? 'rgba(255,255,255,0.95)' : 'rgba(13,17,23,0.95)') + '; border-bottom: 1px solid var(--border)'">
    <div class="max-w-6xl mx-auto px-4 py-3">
      <div class="flex items-center justify-between gap-3">
        <a href="#" class="flex items-center gap-2 shrink-0">
          <div class="w-8 h-8 rounded-lg bg-purple-500 flex items-center justify-center font-bold text-white text-sm">CC</div>
          <span class="font-bold hidden sm:inline" :style="'color: var(--text)'">Claude Code</span>
        </a>
        <div class="flex-1 max-w-md">
          <input
            type="text"
            x-model="search"
            :placeholder="t('searchPlaceholder')"
            class="w-full rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-purple-500"
            :style="'background: var(--card); border: 1px solid var(--border); color: var(--text)'"
          >
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <!-- Theme Toggle -->
          <button @click="toggleTheme()" class="transition text-sm px-2 py-1 rounded hover:opacity-80" :style="'color: var(--muted)'" :title="t('toggleTheme')">
            <span x-text="theme === 'light' ? '🌙' : '☀️'" class="text-lg"></span>
          </button>
          <!-- Language Toggle -->
          <div class="flex rounded-full overflow-hidden text-xs font-medium" :style="'border: 1px solid var(--border)'">
            <button @click="setLang('en')" class="px-2 py-1 transition" :style="lang === 'en' ? 'background: var(--text); color: var(--bg)' : 'color: var(--muted)'">EN</button>
            <button @click="setLang('de')" class="px-2 py-1 transition" :style="lang === 'de' ? 'background: var(--text); color: var(--bg)' : 'color: var(--muted)'">DE</button>
          </div>
          <!-- Print Button -->
          <button @click="printPage()" class="transition text-sm px-2 py-1 rounded hover:opacity-80" :style="'color: var(--muted)'" :title="t('print')">
            🖨️
          </button>
          <!-- PDF Button -->
          <button @click="exportPDF()" :disabled="pdfLoading" class="transition text-sm px-2 py-1 rounded flex items-center gap-1 hover:opacity-80" :style="'color: var(--muted)'" title="Export PDF">
            <template x-if="pdfLoading"><span class="spinner"></span></template>
            <template x-if="!pdfLoading">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
            </template>
            <span class="hidden sm:inline" x-text="pdfLoading ? t('generating') : '⬇ PDF'"></span>
          </button>
          <a href="https://github.com/chhubmann/claude-code-cheatsheet" target="_blank" class="transition hover:opacity-80" :style="'color: var(--muted)'" title="GitHub">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 pt-20">

    <!-- Hero -->
    <section class="hero-section text-center py-12 sm:py-16">
      <h1 class="text-3xl sm:text-5xl font-extrabold mb-4" :style="'color: var(--text)'">
        <span x-text="t('heroPrefix')"></span> <span class="text-purple-500">Claude Code</span> <span x-text="t('heroSuffix')"></span>
      </h1>
      <p class="text-lg mb-6 max-w-2xl mx-auto" :style="'color: var(--muted)'" x-text="t('heroSubtitle')"></p>
      <div class="flex items-center justify-center gap-3 flex-wrap">
        <span class="bg-purple-500/20 text-purple-500 px-3 py-1 rounded-full text-sm font-medium" x-text="'v' + version"></span>
        <span class="px-3 py-1 rounded-full text-sm" :style="'background: var(--card); border: 1px solid var(--border); color: var(--muted)'" x-text="t('updated') + ' ' + lastUpdated"></span>
        <span class="px-3 py-1 rounded-full text-sm" :style="'background: var(--card); border: 1px solid var(--border); color: var(--muted)'" x-text="totalItems + ' ' + t('commands')"></span>
        <!-- OS Toggle -->
        <span class="px-3 py-1 rounded-full text-sm cursor-pointer select-none transition" :style="'background: var(--card); border: 1px solid var(--border); color: var(--muted)'" @click="toggleOS()" :title="t('switchTo') + ' ' + (isMac ? 'Windows/Linux' : 'Mac')">
          <span :style="isMac ? 'color: var(--text); font-weight: 500' : ''">Mac</span>
          <span class="mx-1" :style="'color: var(--muted); opacity: 0.5'">|</span>
          <span :style="!isMac ? 'color: var(--text); font-weight: 500' : ''">Win/Linux</span>
        </span>
      </div>
    </section>

    <!-- Section Nav Pills -->
    <nav class="nav-pill flex gap-2 overflow-x-auto pb-4 mb-8 no-print">
      <template x-for="section in sections" :key="section.id">
        <a
          :href="'#' + section.id"
          class="shrink-0 px-3 py-1.5 rounded-full text-sm font-medium border transition hover:opacity-80"
          :style="'border-color:' + section.color + '40; color:' + section.color + '; background:' + section.color + '15'"
          x-text="section.title"
        ></a>
      </template>
    </nav>

    <!-- Sections -->
    <div id="sections-container">
      <template x-for="section in filteredSections" :key="section.id">
        <section :id="section.id" class="mb-10 print-break">
          <div class="flex items-center gap-3 mb-4">
            <div class="w-1 h-6 rounded-full" :style="'background:' + section.color"></div>
            <h2 class="text-xl font-bold" :style="'color: var(--text)'" x-text="section.title"></h2>
            <span class="text-xs px-2 py-0.5 rounded-full" :style="'color: var(--muted); background: var(--card)'" x-text="section.items.length + ' items'"></span>
          </div>
          <div class="grid gap-2">
            <template x-for="(item, idx) in section.items" :key="section.id + '-' + idx">
              <div class="rounded-lg overflow-hidden" :style="'background: var(--card); border: 1px solid var(--border)'">
                <div
                  class="flex items-center gap-3 px-4 py-3 cursor-pointer select-none transition"
                  @click="toggle(section.id, idx)"
                  style="hover:opacity:0.8"
                >
                  <span
                    class="font-mono text-xs px-2 py-0.5 rounded shrink-0 font-medium"
                    :style="'background:' + section.color + '20; color:' + section.color"
                    x-text="formatKey(item.key)"
                  ></span>
                  <!-- Badge -->
                  <template x-if="item.badge">
                    <span
                      class="text-[10px] font-bold uppercase px-1.5 py-0.5 rounded-full shrink-0"
                      :class="{
                        'badge-new': item.badge === 'NEW',
                        'badge-changed': item.badge === 'CHANGED',
                        'badge-deprecated': item.badge === 'DEPRECATED'
                      }"
                      x-text="item.badge"
                    ></span>
                  </template>
                  <span class="flex-1 text-sm" :style="'color: var(--text); opacity: 0.85'" x-text="item.description"></span>
                  <button
                    class="copy-btn p-1 no-print hover:opacity-80"
                    :style="'color: var(--muted)'"
                    @click.stop="copyToClipboard(item.key)"
                    title="Copy"
                  >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                  </button>
                  <svg
                    class="w-4 h-4 chevron no-print"
                    :class="isOpen(section.id, idx) && 'rotate'"
                    :style="'color: var(--muted)'"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24"
                  ><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </div>
                <div class="accordion-body" :class="isOpen(section.id, idx) && 'open'">
                  <p class="px-4 pb-3 text-sm" :style="'color: var(--muted)'" x-text="item.explanation"></p>
                </div>
              </div>
            </template>
          </div>
        </section>
      </template>
    </div>

    <!-- No results -->
    <div x-show="search && filteredSections.length === 0" class="text-center py-16">
      <p :style="'color: var(--muted)'" class="text-lg"><span x-text="t('noResults')"></span> "<span :style="'color: var(--text)'" x-text="search"></span>"</p>
    </div>

    <!-- Newsletter -->
    <section class="newsletter-section my-16 rounded-xl p-6 sm:p-8 text-center no-print" :style="'background: var(--card); border: 1px solid var(--border)'">
      <h3 class="text-xl font-bold mb-2" :style="'color: var(--text)'" x-text="t('stayUpdated')"></h3>
      <p class="mb-6 text-sm" :style="'color: var(--muted)'" x-text="t('newsletterDesc')"></p>
      <form
        @submit.prevent="subscribeNewsletter()"
        class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto"
      >
        <input
          type="email"
          x-model="email"
          placeholder="you@example.com"
          required
          class="flex-1 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-purple-500"
          :style="'background: var(--bg); border: 1px solid var(--border); color: var(--text)'"
        >
        <button
          type="submit"
          class="bg-purple-500 hover:bg-purple-500/90 text-white font-medium px-6 py-2 rounded-lg text-sm transition"
          x-text="t('subscribe')"
        >
        </button>
      </form>
      <p x-show="subscribed" x-transition class="text-green-400 text-sm mt-3" x-text="t('subscribed')"></p>
    </section>

  </main>

  <!-- Footer -->
  <footer class="py-8 mt-8 no-print" :style="'border-top: 1px solid var(--border)'">
    <div class="max-w-6xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between gap-4 text-sm" :style="'color: var(--muted)'">
      <p x-text="t('footerText')"></p>
      <div class="flex items-center gap-4">
        <a href="https://docs.anthropic.com/en/docs/claude-code" target="_blank" class="hover:opacity-80 transition" :style="'color: var(--muted)'">Official Docs</a>
        <a href="https://github.com/chhubmann/claude-code-cheatsheet" target="_blank" class="hover:opacity-80 transition" :style="'color: var(--muted)'">GitHub</a>
      </div>
    </div>
  </footer>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    const i18n = {
      en: {
        searchPlaceholder: 'Search commands...',
        toggleTheme: 'Toggle dark/light theme',
        print: 'Print',
        generating: 'Generating...',
        heroPrefix: 'The Ultimate',
        heroSuffix: 'Reference',
        heroSubtitle: 'Every shortcut, command, and workflow — searchable, copyable, always up to date.',
        updated: 'Updated',
        commands: 'commands',
        switchTo: 'Click to switch to',
        noResults: 'No commands match',
        stayUpdated: 'Stay Updated',
        newsletterDesc: 'Get notified when Claude Code ships new features.',
        subscribe: 'Subscribe',
        subscribed: "Thanks! You're on the list.",
        footerText: 'Built for the Claude Code community',
      },
      de: {
        searchPlaceholder: 'Befehle suchen...',
        toggleTheme: 'Dark/Light Theme umschalten',
        print: 'Drucken',
        generating: 'Wird generiert...',
        heroPrefix: 'Die ultimative',
        heroSuffix: 'Referenz',
        heroSubtitle: 'Alle Shortcuts, Befehle und Workflows — durchsuchbar, kopierbar, immer aktuell.',
        updated: 'Aktualisiert',
        commands: 'Befehle',
        switchTo: 'Wechseln zu',
        noResults: 'Keine Befehle gefunden für',
        stayUpdated: 'Auf dem Laufenden bleiben',
        newsletterDesc: 'Werde benachrichtigt, wenn Claude Code neue Features veröffentlicht.',
        subscribe: 'Abonnieren',
        subscribed: 'Danke! Du bist auf der Liste.',
        footerText: 'Erstellt für die Claude Code Community',
      }
    };

    function cheatsheet() {
      return {
        sections: [],
        version: '',
        lastUpdated: '',
        search: '',
        email: '',
        subscribed: false,
        openItems: {},
        isMac: navigator.platform.toUpperCase().includes("MAC"),
        pdfLoading: false,
        theme: localStorage.getItem('theme') || 'dark',
        lang: localStorage.getItem('lang') || 'en',

        t(key) {
          return i18n[this.lang]?.[key] || i18n.en[key] || key;
        },

        toggleTheme() {
          this.theme = this.theme === 'dark' ? 'light' : 'dark';
          localStorage.setItem('theme', this.theme);
        },

        setLang(l) {
          this.lang = l;
          localStorage.setItem('lang', l);
        },

        get totalItems() {
          return this.sections.reduce((sum, s) => sum + s.items.length, 0);
        },

        get filteredSections() {
          if (!this.search.trim()) return this.sections;
          const q = this.search.toLowerCase();
          return this.sections
            .map(s => ({
              ...s,
              items: s.items.filter(i =>
                i.key.toLowerCase().includes(q) ||
                i.description.toLowerCase().includes(q) ||
                (i.explanation && i.explanation.toLowerCase().includes(q))
              )
            }))
            .filter(s => s.items.length > 0);
        },

        formatKey(key) {
          if (this.isMac) {
            return key
              .replace(/\bCtrl\b/g, '\u2318')
              .replace(/\bAlt\b/g, '\u2325')
              .replace(/\bOpt\b/g, '\u2325');
          }
          return key;
        },

        toggleOS() {
          this.isMac = !this.isMac;
        },

        init() {
          const data = {"version": "2.81", "lastUpdated": "2026-03-24", "sections": [{"id": "keyboard-shortcuts", "title": "Keyboard Shortcuts", "color": "#ef4444", "icon": "Keyboard", "items": [{"key": "Ctrl + C", "description": "Cancel input/generation", "explanation": "Stops the current generation immediately. Useful when Claude is producing too much output or going in the wrong direction."}, {"key": "Ctrl + C (twice)", "description": "Force quit / exit", "explanation": "Press Ctrl+C twice quickly to force quit Claude Code entirely."}, {"key": "Ctrl + L", "description": "Clear conversation", "explanation": "Clears the current conversation display while keeping context. Good for visual cleanup."}, {"key": "Ctrl + D", "description": "Exit (EOF)", "explanation": "Sends end-of-file signal to exit the Claude Code CLI gracefully."}, {"key": "Ctrl + A", "description": "Move cursor to start of line", "explanation": "Standard terminal shortcut \u2014 jumps cursor to the beginning of the current input line."}, {"key": "Ctrl + E", "description": "Move cursor to end of line", "explanation": "Standard terminal shortcut \u2014 jumps cursor to the end of the current input line."}, {"key": "Ctrl + U", "description": "Delete to start of line", "explanation": "Clears everything from cursor position to the beginning of the line."}, {"key": "Ctrl + K", "description": "Delete to end of line", "explanation": "Clears everything from cursor position to the end of the line."}, {"key": "Ctrl + W", "description": "Delete word backward", "explanation": "Deletes the word before the cursor. Useful for quick corrections."}, {"key": "Ctrl + R", "description": "Reverse search history", "explanation": "Search through your previous Claude Code inputs. Type to filter, Enter to select."}, {"key": "Up / Down", "description": "Navigate input history", "explanation": "Cycle through previously entered prompts. Works like standard shell history."}, {"key": "Tab", "description": "Autocomplete file paths & commands", "explanation": "Tab completion for file paths and slash commands. Press twice to see all options."}, {"key": "Shift + Tab", "description": "Toggle side bar", "explanation": "Shows or hides the conversation side panel for quick navigation between conversations."}, {"key": "Esc", "description": "Cancel / dismiss / back", "explanation": "Cancels the current action, dismisses menus, or navigates back in the UI."}, {"key": "Ctrl + J / Enter", "description": "Newline in multi-line input", "explanation": "Insert a newline in your prompt without submitting. Great for writing multi-line prompts."}, {"key": "@ (mention)", "description": "Reference agent / file / URL", "explanation": "Use @ to mention files, URLs, or agents directly in your prompt for context."}, {"key": "# (hashtag)", "description": "Reference topics / tags", "explanation": "Use # to reference specific topics or conversation tags."}, {"key": "Opt + Enter", "description": "Submit prompt (alternative)", "explanation": "Alternative way to submit your prompt, configurable via keybindings."}]}, {"id": "slash-commands", "title": "Slash Commands", "color": "#f59e0b", "icon": "Terminal", "items": [{"key": "/chat", "description": "Start new conversation", "explanation": "Opens a fresh conversation context. Previous context is preserved in history."}, {"key": "/clear", "description": "Clear conversation context", "explanation": "Resets the conversation context completely. Use when Claude seems confused or context is too long."}, {"key": "/compact", "description": "Compact conversation (summarize)", "explanation": "Summarizes the current conversation to reduce context size while retaining key information. Helps stay within token limits.", "badge": "NEW"}, {"key": "/config", "description": "Open configuration", "explanation": "Opens the Claude Code configuration editor for adjusting settings, permissions, and preferences."}, {"key": "/cost", "description": "Show usage & cost info", "explanation": "Displays token usage and cost information for the current session."}, {"key": "/diff", "description": "Interactive diff viewer", "explanation": "Shows a visual diff of changes Claude has made or is about to make. Helps review before accepting."}, {"key": "/doctor", "description": "Diagnose installation issues", "explanation": "Runs diagnostic checks on your Claude Code installation to identify and fix common problems."}, {"key": "/exit", "description": "Exit Claude Code CLI", "explanation": "Cleanly exits the Claude Code CLI session."}, {"key": "/help", "description": "Show help & available commands", "explanation": "Displays all available slash commands and their descriptions."}, {"key": "/init", "description": "Initialize CLAUDE.md for project", "explanation": "Creates a CLAUDE.md file with project context, conventions, and instructions for Claude to follow."}, {"key": "/login", "description": "Authenticate / log in", "explanation": "Authenticates with your Anthropic account or API key."}, {"key": "/logout", "description": "Log out", "explanation": "Signs out of the current authentication session."}, {"key": "/model", "description": "Change AI model", "explanation": "Switch between available models (e.g., Sonnet, Opus, Haiku). Affects capability and cost."}, {"key": "/permissions", "description": "Manage permission settings", "explanation": "Configure what actions Claude Code can perform automatically vs. requiring approval."}, {"key": "/pr-comments", "description": "View PR review comments", "explanation": "Fetches and displays comments from a GitHub pull request for review and response."}, {"key": "/review", "description": "Code review current changes", "explanation": "Asks Claude to review your current code changes, providing feedback on quality, bugs, and improvements."}, {"key": "/status", "description": "Show session status", "explanation": "Displays current session information including model, context usage, and connection status."}, {"key": "/terminal-setup", "description": "Configure terminal integration", "explanation": "Sets up terminal-specific integrations like shell completions and prompt indicators."}, {"key": "/vim", "description": "Toggle vim keybindings", "explanation": "Enables or disables vim-style keybindings for the input editor."}, {"key": "/fast", "description": "Toggle fast mode", "explanation": "Switches between normal and fast output mode. Uses the same model but with faster streaming. Toggle on/off."}, {"key": "/CONCEPT", "description": "Toggle auto-accept mode", "explanation": "When enabled, automatically accepts all tool calls without prompting for permission."}, {"key": "/add-dir", "description": "Add working directory", "explanation": "Adds an additional directory to Claude's working context for multi-project workflows."}, {"key": "/mcp", "description": "Manage MCP servers", "explanation": "Configure and manage Model Context Protocol servers for extended tool capabilities."}, {"key": "/listen", "description": "Voice input mode", "explanation": "Activates voice/microphone input for hands-free prompting."}, {"key": "/ide", "description": "Configure IDE integration", "explanation": "Sets up integration with VS Code, JetBrains, or other supported IDEs."}]}, {"id": "workflows-tips", "title": "Workflows & Tips", "color": "#22c55e", "icon": "Lightbulb", "items": [{"key": "Plan \u2192 Build \u2192 Accept \u2192 Plan", "description": "Iterative development loop", "explanation": "The core Claude Code workflow: ask Claude to plan first, then build, review and accept changes, then plan the next step. Keeps work focused and reviewable."}, {"key": "Thinking & Effort", "description": "Control Claude's thinking depth", "explanation": "Use 'think harder', 'think step by step', or 'ultrathink' to increase reasoning effort. Higher effort = better results for complex tasks but slower and more expensive.", "badge": "NEW"}, {"key": "Git Workflow", "description": "Let Claude handle git operations", "explanation": "Claude can commit, branch, rebase, resolve conflicts, and create PRs. Say 'commit this' or 'create a PR' and Claude handles the git workflow."}, {"key": "Run Tests First", "description": "Always verify before claiming done", "explanation": "Tell Claude to run tests before finishing. 'Run the tests and fix any failures' ensures code actually works."}, {"key": "Explore \u2192 Fix Pattern", "description": "Let Claude investigate before fixing", "explanation": "For bugs, let Claude explore the codebase first: 'Find where X happens, understand why, then fix it.' Better results than jumping straight to a fix."}, {"key": "Multi-file Editing", "description": "Claude handles cross-file changes", "explanation": "Claude can edit multiple files atomically. Describe the change conceptually: 'Rename the User model to Account everywhere' and Claude finds all references."}, {"key": "/clear for Fresh Context", "description": "Reset when context gets stale", "explanation": "If Claude seems confused or stuck, /clear resets context. Then re-describe what you need with fresh context."}, {"key": "Claude + 'make'", "description": "Create files and boilerplate", "explanation": "Say 'make a React component for X' or 'make a test file for Y'. Claude creates well-structured files following project conventions."}, {"key": "Claude + 'open' / 'apply'", "description": "Open files or apply suggestions", "explanation": "Ask Claude to 'open the config file' or 'apply the changes we discussed'. Natural language file operations."}, {"key": "Ask for Plan First", "description": "Get Claude to outline before coding", "explanation": "For complex tasks, say 'plan how to implement X before writing code'. Claude outlines the approach for your review before making changes."}, {"key": "YOLO Mode", "description": "Auto-accept all changes", "explanation": "Use --dangerously-skip-permissions or /CONCEPT to auto-accept all tool calls. Useful for trusted, well-defined tasks. Use with caution!"}, {"key": "Headless / CI Mode", "description": "Non-interactive for automation", "explanation": "Use 'claude -p \"prompt\"' for non-interactive single-shot execution. Perfect for CI/CD pipelines and automation scripts."}, {"key": "Context Loading", "description": "Provide relevant context upfront", "explanation": "Paste error messages, link files with @, or describe the architecture. More context = better results. Claude reads files you reference."}, {"key": "Checkpoints / 'Undo'", "description": "Claude creates restore points", "explanation": "Claude automatically creates git checkpoints before major changes. Ask 'undo that' to revert to the last checkpoint."}]}, {"id": "skills-agents", "title": "Skills & Agents", "color": "#06b6d4", "icon": "Users", "items": [{"key": "Custom Skills (.claude/skills/)", "description": "Create reusable prompt templates", "explanation": "Define skills as markdown files in .claude/skills/ or .claude/commands/. Each file becomes a slash command. Include frontmatter for name, description, and trigger conditions."}, {"key": "/skill-name", "description": "Invoke a custom skill", "explanation": "Run any custom skill by typing /skill-name. Skills can include complex multi-step workflows, coding standards, or domain-specific instructions."}, {"key": "Agent Tool (subagents)", "description": "Spawn specialized sub-agents", "explanation": "Claude can launch sub-agents for parallel work. Types include: general-purpose, Explore (codebase search), Plan (architecture), code-reviewer, and more."}, {"key": "Parallel Agents", "description": "Run multiple agents concurrently", "explanation": "Launch multiple sub-agents in a single message for independent tasks. E.g., research + implementation can run in parallel for faster results."}, {"key": "Background Agents", "description": "Long-running async tasks", "explanation": "Set run_in_background: true for agents that take a long time. You get notified when they complete. Great for large codebase searches.", "badge": "NEW"}, {"key": "Git Worktree Isolation", "description": "Agents work in isolated branches", "explanation": "Use isolation: 'worktree' to give agents their own copy of the repo. Changes stay isolated until reviewed and merged."}, {"key": "Agent SDK", "description": "Build custom agents programmatically", "explanation": "The Claude Agent SDK lets you build custom agents with tool use, memory, and multi-turn conversations. Available for Python and TypeScript."}, {"key": "Hooks (event-driven)", "description": "Shell commands on events", "explanation": "Configure hooks in settings.json to run shell commands in response to Claude Code events (pre/post tool calls, prompt submit, etc.).", "badge": "NEW"}, {"key": "Remote Agents (Triggers)", "description": "Schedule agents on cron", "explanation": "Use /schedule to create remote agents that run on a cron schedule. Perfect for automated code reviews, dependency updates, or monitoring.", "badge": "NEW"}]}, {"id": "mcp-servers", "title": "MCP Servers", "color": "#3b82f6", "icon": "Server", "items": [{"key": "transport: stdio", "description": "Standard I/O transport", "explanation": "Most common transport. MCP server communicates via stdin/stdout. Best for local tools. Config: {\"command\": \"node\", \"args\": [\"server.js\"]}"}, {"key": "transport: sse", "description": "Server-Sent Events transport", "explanation": "HTTP-based transport using SSE. Good for remote servers. Config: {\"url\": \"https://mcp-server.example.com/sse\"}"}, {"key": "transport: rest", "description": "REST API transport (Remote MCP)", "explanation": "RESTful HTTP transport for remote MCP servers. Supports authentication headers and custom endpoints."}, {"key": "Project: .mcp.json", "description": "Project-level MCP config", "explanation": "Place .mcp.json in your project root to define MCP servers available to all team members. Checked into version control."}, {"key": "User: ~/.claude/mcp.json", "description": "User-level MCP config", "explanation": "Personal MCP server configuration at ~/.claude/mcp.json. Available across all projects for this user."}, {"key": "Auth: API key / OAuth", "description": "MCP server authentication", "explanation": "MCP servers can require API keys (via env vars) or OAuth flows. Configure in the server's env or headers field."}, {"key": "/mcp", "description": "Manage MCP servers interactively", "explanation": "Use the /mcp slash command to add, remove, or configure MCP servers without editing JSON files directly."}, {"key": "Popular: GitHub, Slack, Linear", "description": "Common MCP integrations", "explanation": "Pre-built MCP servers exist for GitHub (issues, PRs), Slack (messages), Linear (tasks), Postgres (queries), and many more."}, {"key": "npx @anthropic/create-mcp", "description": "Scaffold a new MCP server", "explanation": "Quick-start command to create a new MCP server project with TypeScript boilerplate and example tools."}]}, {"id": "memory-files", "title": "Memory & Files", "color": "#a855f7", "icon": "Brain", "items": [{"key": "CLAUDE.md", "description": "Project instructions file", "explanation": "The primary way to give Claude persistent instructions. Place in project root. Contains coding conventions, architecture notes, and project-specific rules Claude should follow."}, {"key": "~/.claude/CLAUDE.md", "description": "Global user instructions", "explanation": "User-level instructions that apply to ALL projects. Good for personal preferences, coding style, and default behaviors."}, {"key": ".claude/ directory", "description": "Claude Code project config", "explanation": "Contains project-specific Claude Code configuration: skills, commands, settings overrides, and local state."}, {"key": ".claude/settings.json", "description": "Project permission settings", "explanation": "Defines allowed/denied tools and permissions at the project level. Checked into git for team-wide consistency."}, {"key": "~/.claude/settings.json", "description": "User permission settings", "explanation": "Personal permission settings that apply across all projects. Overridden by project-level settings."}, {"key": "Memory system", "description": "Persistent memory across sessions", "explanation": "Claude Code can save memories to ~/.claude/memory/ for recall in future conversations. Includes user preferences, project context, and learned patterns."}, {"key": "Context @ mentions", "description": "Reference files and URLs inline", "explanation": "Use @filename or @url in prompts to load file contents or web pages directly into context. Claude reads them automatically."}, {"key": "Data export / import", "description": "Backup and restore conversations", "explanation": "Export conversation history and settings for backup or migration. Import to restore on a new machine."}]}, {"id": "config-env", "title": "Config & ENV", "color": "#f97316", "icon": "Settings", "items": [{"key": "ANTHROPIC_API_KEY", "description": "API key for authentication", "explanation": "Set your Anthropic API key as an environment variable. Required for API-based authentication (vs. OAuth login)."}, {"key": "CLAUDE_CODE_MAX_TOKENS", "description": "Max output tokens per response", "explanation": "Controls maximum tokens Claude can generate per response. Higher values allow longer outputs but cost more."}, {"key": "CLAUDE_CODE_USE_BEDROCK=1", "description": "Use AWS Bedrock backend", "explanation": "Route Claude Code requests through AWS Bedrock instead of direct API. Requires AWS credentials configured."}, {"key": "CLAUDE_CODE_USE_VERTEX=1", "description": "Use Google Vertex AI backend", "explanation": "Route Claude Code requests through Google Cloud Vertex AI. Requires GCP credentials and project configured."}, {"key": "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC", "description": "Disable telemetry & analytics", "explanation": "Prevents Claude Code from sending non-essential telemetry data. Good for privacy-sensitive environments."}, {"key": "CLAUDE_CODE_SKIP_CLAUDE_MD", "description": "Skip loading CLAUDE.md files", "explanation": "Bypasses loading of CLAUDE.md instruction files. Useful for debugging when you suspect CLAUDE.md causes issues."}, {"key": "CLAUDE_CODE_BUDGET_TOKENS", "description": "Set thinking budget tokens", "explanation": "Controls the token budget for Claude's internal thinking/reasoning. More tokens = deeper analysis."}, {"key": "CLAUDE_CODE_PLUGIN_DIR", "description": "Custom plugin directory path", "explanation": "Override the default plugin directory location. Useful for shared team plugin repositories."}, {"key": "CLAUDE_CODE_EXPERT_LOOK_UP", "description": "Expert lookup configuration", "explanation": "Configure external expert/knowledge lookup sources for enhanced context retrieval."}, {"key": "CLAUDE.md (Env section)", "description": "Environment config in CLAUDE.md", "explanation": "Define environment-specific settings directly in CLAUDE.md. Claude reads and applies them automatically."}, {"key": "settings.json (allowedTools)", "description": "Configure auto-allowed tools", "explanation": "In .claude/settings.json, set allowedTools to auto-approve specific tools: [\"Bash(git *)\", \"Read\", \"Edit\", \"Write\"]"}, {"key": "settings.json (hooks)", "description": "Event-driven automation hooks", "explanation": "Configure shell commands that run on events: PreToolUse, PostToolUse, UserPromptSubmit, etc. Great for linting, formatting, or notifications."}]}, {"id": "cli-flags", "title": "CLI & Flags", "color": "#ec4899", "icon": "Flag", "items": [{"key": "claude", "description": "Start interactive REPL", "explanation": "Launch Claude Code in interactive mode. The default way to use Claude Code \u2014 opens a conversational interface in your terminal."}, {"key": "claude -p \"prompt\"", "description": "Non-interactive single prompt", "explanation": "Execute a single prompt and exit. Perfect for scripts, CI/CD, and automation. Output goes to stdout."}, {"key": "claude -c", "description": "Continue last conversation", "explanation": "Resume the most recent conversation with full context preserved. Great for picking up where you left off."}, {"key": "claude -r \"prompt\"", "description": "Resume with new prompt", "explanation": "Continue the last conversation but immediately send a new prompt. Combines -c with a new message."}, {"key": "claude --model <name>", "description": "Specify model to use", "explanation": "Choose a specific model: --model claude-sonnet-4-6, --model claude-opus-4-6, --model claude-haiku-4-5-20251001"}, {"key": "claude --allowedTools", "description": "Set allowed tools for session", "explanation": "Pre-approve specific tools: --allowedTools 'Bash(git *)' 'Read' 'Edit'. Reduces permission prompts."}, {"key": "claude --dangerously-skip-permissions", "description": "Skip ALL permission checks (YOLO)", "explanation": "Auto-accepts every tool call without asking. Powerful but dangerous \u2014 only use for trusted, well-defined tasks in safe environments."}, {"key": "claude --output-format json", "description": "JSON output format", "explanation": "Output responses as JSON for programmatic consumption. Options: text, json, stream-json. Great for piping to other tools."}, {"key": "claude --verbose", "description": "Enable verbose output", "explanation": "Shows additional debug information including tool calls, token counts, and internal reasoning steps."}, {"key": "claude config set <key> <val>", "description": "Set configuration values", "explanation": "Persistently set config values: claude config set model claude-opus-4-6, claude config set theme dark"}, {"key": "claude mcp add <name>", "description": "Add MCP server via CLI", "explanation": "Add an MCP server from command line: claude mcp add github --transport stdio -- npx @anthropic/mcp-github"}, {"key": "claude update", "description": "Update Claude Code to latest", "explanation": "Updates Claude Code CLI to the latest version. Run periodically to get new features and bug fixes."}, {"key": "cat file | claude -p \"prompt\"", "description": "Pipe input as context", "explanation": "Pipe file contents or command output directly into Claude: git diff | claude -p 'review this diff'. Stdin becomes part of the prompt context."}, {"key": "claude -p --output-format stream-json", "description": "Streaming JSON output", "explanation": "Stream responses as newline-delimited JSON objects. Each chunk is a valid JSON object. Best for real-time processing."}]}]};

          this.version = data.version;

        },

        toggle(sectionId, idx) {
          const key = sectionId + '-' + idx;
          this.openItems[key] = !this.openItems[key];
        },

        isOpen(sectionId, idx) {
          return this.openItems[sectionId + '-' + idx] || false;
        },

        async copyToClipboard(text) {
          try {
            await navigator.clipboard.writeText(text);
          } catch {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          }
        },

        subscribeNewsletter() {
          console.log('Newsletter signup:', this.email);
          this.subscribed = true;
          this.email = '';
        },

        printPage() {
          // Save current open state
          const savedOpenItems = { ...this.openItems };
          // Open all accordions
          for (const section of this.sections) {
            for (let i = 0; i < section.items.length; i++) {
              this.openItems[section.id + '-' + i] = true;
            }
          }
          // Add print-grid class to sections container
          const container = document.getElementById('sections-container');
          container.classList.add('print-grid');
          // Wait for DOM update then print
          this.$nextTick(() => {
            window.print();
            // Restore state after print
            this.openItems = savedOpenItems;
            container.classList.remove('print-grid');
          });
        },

        async exportPDF() {
          if (this.pdfLoading) return;
          this.pdfLoading = true;

          try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            const pageW = doc.internal.pageSize.getWidth();
            const pageH = doc.internal.pageSize.getHeight();
            const margin = 10;
            const colGap = 6;
            const colW = (pageW - margin * 2 - colGap) / 2;
            let col = 0;
            let y = margin;

            const addBackground = () => {
              doc.setFillColor(13, 17, 23);
              doc.rect(0, 0, pageW, pageH, 'F');
            };

            addBackground();

            // Title bar
            doc.setFontSize(14);
            doc.setTextColor(168, 85, 247);
            doc.text('Claude Code Cheatsheet v' + this.version, pageW / 2, y + 6, { align: 'center' });
            y = y + 12;
            doc.setDrawColor(48, 54, 61);
            doc.line(margin, y, pageW - margin, y);
            y += 4;

            const startY = y;

            const hexToRgb = (hex) => {
              const r = parseInt(hex.slice(1, 3), 16);
              const g = parseInt(hex.slice(3, 5), 16);
              const b = parseInt(hex.slice(5, 7), 16);
              return [r, g, b];
            };

            const checkPage = (needed) => {
              if (y + needed > pageH - margin) {
                if (col === 0) {
                  col = 1;
                  y = startY;
                } else {
                  doc.addPage();
                  addBackground();
                  col = 0;
                  y = margin + 4;
                }
              }
            };

            const getX = () => margin + col * (colW + colGap);

            for (const section of this.sections) {
              checkPage(14);
              const [sr, sg, sb] = hexToRgb(section.color);

              // Section header
              doc.setFillColor(sr, sg, sb);
              doc.rect(getX(), y, 1.5, 5, 'F');
              doc.setFontSize(9);
              doc.setTextColor(sr, sg, sb);
              doc.text(section.title.toUpperCase(), getX() + 4, y + 4);
              y += 8;

              for (const item of section.items) {
                const keyText = this.formatKey(item.key);
                const descText = item.description;
                const explText = item.explanation || '';

                // Estimate height needed
                const descLines = doc.splitTextToSize(descText, colW - 4);
                const explLines = doc.splitTextToSize(explText, colW - 4);
                const itemH = 4 + descLines.length * 3 + (explText ? explLines.length * 2.8 + 1 : 0) + 2;

                checkPage(itemH);

                // Key badge
                doc.setFontSize(6.5);
                doc.setTextColor(sr, sg, sb);
                const badgeW = Math.min(doc.getTextWidth(keyText) + 3, colW - 2);
                doc.setFillColor(sr, sg, sb, 0.15);
                doc.roundedRect(getX(), y, badgeW, 4, 1, 1, 'F');
                doc.text(keyText, getX() + 1.5, y + 2.8);

                // Badge label
                if (item.badge) {
                  const bx = getX() + badgeW + 1.5;
                  doc.setFontSize(5);
                  if (item.badge === 'NEW') doc.setTextColor(34, 197, 94);
                  else if (item.badge === 'CHANGED') doc.setTextColor(245, 158, 11);
                  else doc.setTextColor(239, 68, 68);
                  doc.text(item.badge, bx, y + 2.8);
                }

                y += 5;

                // Description
                doc.setFontSize(6);
                doc.setTextColor(209, 213, 219);
                doc.text(descLines, getX() + 1, y + 2);
                y += descLines.length * 3;

                // Explanation
                if (explText) {
                  doc.setFontSize(5.5);
                  doc.setTextColor(139, 148, 158);
                  doc.text(explLines, getX() + 1, y + 1.5);
                  y += explLines.length * 2.8 + 1;
                }

                y += 1.5;
              }

              y += 3;
            }

            doc.save('claude-code-cheatsheet.pdf');
          } catch (err) {
            console.error('PDF generation failed:', err);
            alert('PDF generation failed. Check console for details.');
          } finally {
            this.pdfLoading = false;
          }
        }
      };
    }
